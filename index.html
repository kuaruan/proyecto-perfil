<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto perfil</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div id="tarjeta">
        <img src="Agott.jpg" alt="Avatar">
        <h1>kuaruan</h1>
        <p> Developer | Reader | Gamer</p>

        <div class="redes">
            <a href="https://open.spotify.com/user/31adwmstdsm6hqpf3rj4qq4hircu" target="_blank">
                <i class="fab fa-spotify"></i>
            </a>
        </div>

    <div class="reproductor">
        <div class="info-musica">
            <p class="cancion">worry (Slowed)</p>
            <p class="artista">LONOWN</p>
        </div>

        <div class="controles">
            <button id="btn-prev" class="btn-secundario"><i class="fas fa-backward-step"></i></button>
            <button id="btn-play"><i class="fas fa-play"></i></button>
            <button id="btn-next" class="btn-secundario"><i class="fas fa-forward-step"></i></button>

        </div>

        <div class="progreso-contenedor">
            <span id="tiempo-actual">0:00</span>
            <div class="barra-progreso">
                <div class="progreso" id="progreso"></div>
            </div>
            <span is="tiempo-total">3:21</span>
        </div>

        <div class= "volumen">
            <i class="fas fa-volume-low" id="icono-volumen"></i>
            <input type="range" id="control-volumen" min = '0' max = '1' step="0.05" value="0.4">
        </div>
    </div>
    </div>

    <audio id="audio" src="worry (Slowed) - LONOWN.mp3"></audio>
    
    <script src="script.js"></script>
</body>
</html>
